services:
  db:
    image: postgis/postgis:16-3.4
    container_name: onestep-postgis
    environment:
      POSTGRES_DB: onestep
      POSTGRES_USER: onestep
      POSTGRES_PASSWORD: onestep
    ports:
      - "5432:5432"
    volumes:
      - onestep_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./data/processed/csv:/workspace/data/processed/csv:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onestep -d onestep"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  onestep_pgdata:
